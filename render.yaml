services:
  - type: web
    name: zdspgc-enrollment-system
    env: node
    plan: starter
    buildCommand: ./render-build.sh
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: zdspgc-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: zdspgc-redis
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 10000

databases:
  - name: zdspgc-db
    plan: starter

redis:
  - name: zdspgc-redis
    plan: starter
    ipAllowList: [] # This allows all traffic, Render handles security within the private network
