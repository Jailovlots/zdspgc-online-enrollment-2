services:
  - type: web
    name: zdspgc-enrollment-system
    env: node
    plan: starter # Keeping Starter for the web app ensures it stays online 24/7
    buildCommand: ./render-build.sh
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # You will paste your Neon database URL in the Render dashboard
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 10000
